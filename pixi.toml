[workspace]
authors = ["amiya <amiya19mandal@gmail.com>"]
channels = ["conda-forge"]
name = "fastAPI_api"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
runserver = "python manage.py runserver"
startapp = "python manage.py startapp"
initdb = "python manage.py init-db"
makemigrations = "python manage.py makemigrations"
migrate = "python manage.py migrate"
dbshell = "python manage.py dbshell"
shell = "python manage.py shell"

[dependencies]
python = "3.11.*"
uvicorn = "*"

[pypi-dependencies]
fastapi = ">=0.110"
# fastadmin: Django-admin-style panel with a SQLAlchemy backend and
# JWT-cookie sessions (no Redis).
fastadmin = ">=0.2.22, <0.3"
beartype = ">=0.18"
loguru = ">=0.7"
pydantic-settings = ">=2.2"
email-validator = ">=2.0"
httpx = ">=0.27"
python-dotenv = ">=1.0"
bcrypt = ">=4.0"
# Databricks is the only datastore: SQLAlchemy 2.0 + the (synchronous)
# Databricks dialect, with Alembic for migrations.
databricks-sqlalchemy = ">=2.0, <3"
sqlalchemy = ">=2.0"
alembic = ">=1.13"
